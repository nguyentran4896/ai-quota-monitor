name: Feature request
description: Propose a focused improvement to QuotaDeck.
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should QuotaDeck solve?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Platform scope
      options: [All platforms, Windows, macOS, Linux]
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Credential and privacy impact
      description: Explain whether this changes authentication, storage, telemetry, or subprocess behavior.
    validations:
      required: true
