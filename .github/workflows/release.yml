name: Native release artifacts

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  unsigned-build:
    name: Build unsigned ${{ matrix.platform }} artifact
    if: ${{ !(startsWith(github.ref, 'refs/tags/v') && vars.RELEASES_ENABLED == 'true') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            script: package:win
            architectures: --x64
          - platform: macos
            os: macos-latest
            script: package:mac
            architectures: --x64 --arm64
          - platform: linux
            os: ubuntu-latest
            script: package:linux
            architectures: --x64

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build unsigned Windows or Linux artifacts
        if: matrix.platform != 'macos'
        run: pnpm run ${{ matrix.script }} ${{ matrix.architectures }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build unsigned macOS inspection artifacts
        if: matrix.platform == 'macos'
        run: pnpm run package:mac --x64 --arm64 --publish never -c.mac.identity=null -c.mac.hardenedRuntime=false -c.mac.notarize=false
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload unsigned artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quotadeck-${{ matrix.platform }}-unsigned
          path: |
            release/*.exe
            release/*.blockmap
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
          if-no-files-found: error
          retention-days: 14

  release-policy:
    name: Verify release tag
    if: startsWith(github.ref, 'refs/tags/v') && vars.RELEASES_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out complete tag history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Verify annotated tag and package version
        run: node scripts/verify-release-tag.mjs "$GITHUB_REF_NAME"

  release-build:
    name: Build signed ${{ matrix.platform }} release
    needs: release-policy
    if: startsWith(github.ref, 'refs/tags/v') && vars.RELEASES_ENABLED == 'true'
    environment: release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            script: package:win
            architectures: --x64
          - platform: macos
            os: macos-latest
            script: package:mac
            architectures: --x64 --arm64
          - platform: linux
            os: ubuntu-latest
            script: package:linux
            architectures: --x64

    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Apple notarization key
        if: matrix.platform == 'macos'
        run: node scripts/apple-api-key.mjs prepare
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}

      - name: Verify Windows signing credentials
        if: matrix.platform == 'windows'
        run: node scripts/verify-signing-env.mjs windows
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify macOS signing and notarization credentials
        if: matrix.platform == 'macos'
        run: node scripts/verify-signing-env.mjs macos
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build signed Windows artifacts
        if: matrix.platform == 'windows'
        run: pnpm run package:win --x64 --publish never -c.forceCodeSigning=true
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Build signed and notarized macOS artifacts
        if: matrix.platform == 'macos'
        run: pnpm run package:mac --x64 --arm64 --publish never -c.forceCodeSigning=true
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Linux artifacts
        if: matrix.platform == 'linux'
        run: pnpm run package:linux --x64 --publish never

      - name: Verify Authenticode signatures
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $artifacts = Get-ChildItem -Path release -Filter *.exe
          if (-not $artifacts) { throw "No Windows executables were produced." }
          foreach ($artifact in $artifacts) {
            $signature = Get-AuthenticodeSignature -LiteralPath $artifact.FullName
            if ($signature.Status -ne "Valid") {
              throw "$($artifact.Name) is not Authenticode-valid: $($signature.Status)"
            }
          }

      - name: Verify notarization and signatures
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          app_count=0
          while IFS= read -r -d '' app_bundle; do
            codesign --verify --deep --strict --verbose=2 "$app_bundle"
            spctl --assess --verbose --type execute "$app_bundle"
            xcrun stapler validate "$app_bundle"
            app_count=$((app_count + 1))
          done < <(find release -mindepth 2 -maxdepth 2 -type d -name '*.app' -print0)
          test "$app_count" -eq 2
          for artifact in release/*.dmg; do
            test -e "$artifact"
            hdiutil verify "$artifact"
          done

      - name: Verify Linux package structure
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          set -euo pipefail
          dpkg-deb --info release/*.deb >/dev/null
          test -x release/*.AppImage

      - name: Remove Apple notarization key
        if: always() && matrix.platform == 'macos'
        run: node scripts/apple-api-key.mjs cleanup

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: quotadeck-${{ matrix.platform }}-release
          path: |
            release/*.exe
            release/*.blockmap
            release/*.dmg
            release/*.zip
            release/*.AppImage
            release/*.deb
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub release
    needs: release-build
    if: startsWith(github.ref, 'refs/tags/v') && vars.RELEASES_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download signed native artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: sha256sum artifacts/* > artifacts/SHA256SUMS.txt

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" artifacts/* --verify-tag --generate-notes --title "QuotaDeck $GITHUB_REF_NAME"
        env:
          GH_TOKEN: ${{ github.token }}
